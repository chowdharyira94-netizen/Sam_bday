<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>🌹</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

font-family:'Cormorant Garamond',serif;

background:linear-gradient(
180deg,
#ff9db8,
#ff7aa2,
#ffb6d5
);

position:relative;

}

/* Sparkles */

.sparkle{
position:absolute;
color:white;
opacity:.7;
animation:twinkle 3s infinite;
pointer-events:none;
}

@keyframes twinkle{

50%{
opacity:.2;
transform:scale(1.3);
}

}



/* Content */

.container{

padding:20px;
color:white;
z-index:2;

}

.line1{

font-size:42px;

opacity:0;

animation:fadeIn .9s forwards;

}

.line2{

font-size:44px;

margin-top:25px;

opacity:0;

animation:fadeIn .9s forwards;
animation-delay:1s;

}

.line3{

font-size:42px;

margin-top:25px;

opacity:0;

animation:fadeIn .9s forwards;
animation-delay:2s;

}

.rose{

font-size:110px;

margin-top:20px;

opacity:0;

animation:
fadeIn 1.2s forwards,
floatRose 3s ease-in-out infinite;

animation-delay:3s,4.2s;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes floatRose{

50%{
transform:translateY(-12px);
}

}

/* Mobile */

@media(max-width:700px){

.line1{
font-size:32px;
}

.line2{
font-size:34px;
}

.line3{
font-size:32px;
}

.rose{
font-size:80px;
}

}

</style></head>
<body><!-- Sparkles --><div class="sparkle" style="top:8%;left:10%;">✦</div>
<div class="sparkle" style="top:15%;right:12%;">✦</div>
<div class="sparkle" style="top:30%;left:20%;">✦</div>
<div class="sparkle" style="top:40%;right:18%;">✦</div>
<div class="sparkle" style="bottom:25%;left:15%;">✦</div>
<div class="sparkle" style="bottom:18%;right:12%;">✦</div>
<div class="container"><div class="line1">
Now since you've clicked 👀...
</div><div class="line2">
I Love You ❤️
</div><div class="line3">
Ye Tumhare Liye
</div><div class="rose">
🌹
</div></div></body>
</html>
