<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Wisely 🚪</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Quicksand',sans-serif;
}

body{
min-height:100vh;

background:linear-gradient(
180deg,
#f6e7d8,
#edd5c0,
#e7c4a8
);

display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
padding:20px;
}

h1{
font-size:55px;
color:#5b3a29;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
color:#6d4c41;
margin-bottom:40px;
}

.message{
font-size:28px;
font-weight:700;
color:#5b3a29;
min-height:80px;
margin-bottom:25px;
transition:.5s;
}

.doors{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.door{
width:120px;
height:180px;

background:linear-gradient(
180deg,
#6d4c41,
#4e342e
);

border-radius:12px;

cursor:pointer;

position:relative;

box-shadow:
0 10px 20px rgba(0,0,0,.2);

transition:.6s;
transform-origin:left center;
}

.door:hover:not(.opened){
transform:scale(1.03);
}

.door::after{
content:"";
position:absolute;

right:15px;
top:85px;

width:10px;
height:10px;

border-radius:50%;

background:#ffd54f;
}

.hidden{
display:none;
}

#secretArea{
display:none;
animation:fadeIn 1s ease;
}

.reward{
font-size:30px;
font-weight:700;
color:#5b3a29;
margin-bottom:20px;
}

.fourth{
font-size:35px;
margin-bottom:20px;
}

.secret-door{
width:140px;
height:200px;

margin:auto;

background:linear-gradient(
180deg,
#6d4c41,
#4e342e
);

border-radius:12px;

cursor:pointer;

position:relative;

box-shadow:
0 10px 20px rgba(0,0,0,.2);

transition:.3s;
}

.secret-door:hover{
transform:translateY(-8px);
}

.secret-door::after{
content:"";
position:absolute;

right:18px;
top:95px;

width:12px;
height:12px;

border-radius:50%;

background:#ffd54f;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:750px){

h1{
font-size:38px;
}

.subtitle{
font-size:17px;
}

.message{
font-size:22px;
}

.door{
width:95px;
height:145px;
}

.secret-door{
width:120px;
height:170px;
}
.opened{
transform:perspective(800px) rotateY(-75deg);
transform-origin:left center;
pointer-events:none;
}
}

</style>
</head>
<body>

<div class="container">

<h1>Choose Wisely 😌</h1>

<div class="subtitle">
One of these doors leads somewhere... probably 😏
</div>

<div class="message" id="message"></div>

<div class="doors" id="doors">

<div class="door" onclick="doorClick(this)"></div>

<div class="door" onclick="doorClick(this)"></div>

<div class="door" onclick="doorClick(this)"></div>

</div>

<div id="secretArea">

<div class="reward">
But I guess you've earned this 💗
</div>

<div class="fourth">
😛😛 4th door ✅
</div>

<div class="secret-door"
onclick="window.location.href='page3.html'">
</div>

</div>

</div>

<script>

let count = 0;

const texts = [

"Congratulations 🎉<br>You found absolutely nothing 😁",

"Wrong door again 🤪",

"😏😏 Okk Nice try"

];

function doorClick(door){

document.getElementById("message").innerHTML = texts[count];

door.classList.add("opened");

count++;

if(count === 3){

setTimeout(()=>{

document.getElementById("doors").style.display="none";

document.getElementById("secretArea").style.display="block";

},1200);

}

}

</script>

</body>
</html>
